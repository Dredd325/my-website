<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gifts Battle</title>

<style>
body {
  margin:0;
  background:#0d0d14;
  color:white;
  font-family:Arial;
}

.screen { display:none; padding:16px; }
.screen.active { display:block; }

.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.card {
  background:#1a1a2e;
  border-radius:16px;
  padding:12px;
  text-align:center;
  cursor:pointer;
}

.card img {
  width:100%;
  height:120px;
  object-fit:contain;
}

.price {
  margin-top:8px;
  background:#222;
  padding:6px;
  border-radius:10px;
}

button {
  padding:12px;
  border:none;
  border-radius:12px;
  margin-top:10px;
  width:100%;
  font-size:16px;
  cursor:pointer;
}

.open { background:#3b6cf8; color:white; }
.demo { background:#333; color:white; }

.multi button {
  width:auto;
  margin:5px;
}

.balance {
  padding:10px;
  background:#111;
  text-align:center;
}
</style>
</head>

<body>

<div class="balance">⭐ <span id="stars">1000</span></div>

<!-- CASES -->
<div id="cases" class="screen active">
  <div class="grid" id="casesGrid"></div>
</div>

<!-- CASE PAGE -->
<div id="case" class="screen">
  <button onclick="back()">← Назад</button>
  <h2 id="title"></h2>
  <img id="image" style="width:100%;max-height:200px">

  <button class="open" onclick="openCase()">Открыть</button>
  <button class="demo" onclick="demoCase()">Демо</button>

  <div class="multi">
    <button onclick="setMulti(1)">x1</button>
    <button onclick="setMulti(2)">x2</button>
    <button onclick="setMulti(3)">x3</button>
    <button onclick="setMulti(5)">x5</button>
  </div>
</div>

<script>

let stars = 1000;
let currentCase = null;
let multi = 1;

const cases = [
  {name:'Весеннее обострение', img:'https://i.imgur.com/8Km9tLL.png', price:850},
  {name:'Солнечный день', img:'https://i.imgur.com/OVQ6F7B.png', price:550},
  {name:'Хрустальный шторм', img:'https://i.imgur.com/6RZ8F1R.png', price:600},
  {name:'Зелёный рынок', img:'https://i.imgur.com/j6YbQbM.png', price:260},
  {name:'Темный друн', img:'https://i.imgur.com/Y2a7X9y.png', price:931},
  {name:'Pepe Gold', img:'https://i.imgur.com/2DhmtJ4.png', price:1500},
  {name:'TON Legends', img:'https://i.imgur.com/4AiXzf8.png', price:1200},
  {name:'Crypto Night', img:'https://i.imgur.com/7yUvePI.png', price:700},
  {name:'NFT Madness', img:'https://i.imgur.com/tGbaZCY.png', price:999},
  {name:'Mega Drop', img:'https://i.imgur.com/Xb9U9vP.png', price:2000}
];

function render(){
  const grid = document.getElementById('casesGrid');
  grid.innerHTML = cases.map((c,i)=>    <div class="card" onclick="openPage(${i})">       <img src="${c.img}">       <div>${c.name}</div>       <div class="price">⭐ ${c.price}</div>     </div>  ).join('');
}

function openPage(i){
  currentCase = cases[i];
  document.getElementById('cases').classList.remove('active');
  document.getElementById('case').classList.add('active');

  document.getElementById('title').textContent = currentCase.name;
  document.getElementById('image').src = currentCase.img;
}

function back(){
  document.getElementById('case').classList.remove('active');
  document.getElementById('cases').classList.add('active');
}

function setMulti(n){
  multi = n;
}

function openCase(){
  if(stars < currentCase.price * multi){
    alert('Недостаточно ⭐');
    return;
  }

  stars -= currentCase.price * multi;
  update();

  let total = 0;

  for(let i=0;i<multi;i++){
    const drop = Math.floor(Math.random()*1000);
    total += drop;
  }

  alert('Выпало ⭐ ' + total);
  stars += total;
  update();
}

function demoCase(){
  let total = 0;
  for(let i=0;i<multi;i++){
    const drop = Math.floor(Math.random()*1000);
    total += drop;
  }
  alert('DEMO: ⭐ ' + total);
}

function update(){
  document.getElementById('stars').textContent = stars;
}

render();
update();

</script>

</body>
</html>
