<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Blox</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #060606;
            --surface: #0f0f0f;
            --surface2: #1a1a1a;
            --border: #222;
            --text: #f0f0f0;
            --text2: #888;
            --text3: #555;
            --accent: #4f8fff;
            --green: #2ecc71;
            --red: #e74c3c;
            --orange: #f39c12;
            --radius: 18px;
            --radius-sm: 12px;
            --radius-xs: 8px;
            --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            padding: 20px 16px 100px;
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            max-width: 440px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .logo { font-size: 22px; font-weight: 700; }
        .bal-pill {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 10px 18px;
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .bal-dot { width: 9px; height: 9px; background: var(--accent); border-radius: 50%; }

        .stats-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            margin-bottom: 16px;
        }
        .stat-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 12px;
            text-align: center;
        }
        .stat-val { font-size: 16px; font-weight: 700; }
        .stat-lbl { font-size: 10px; color: var(--text3); }

        .level-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 16px;
        }
        .lvl-circle {
            width: 46px; height: 46px;
            background: var(--accent);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 17px; color: #fff; flex-shrink: 0;
        }
        .lvl-info { flex: 1; }
        .lvl-name { font-weight: 700; font-size: 14px; }
        .lvl-sub { font-size: 11px; color: var(--text2); }
        .bar { height: 4px; background: var(--border); border-radius: 2px; margin-top: 6px; overflow: hidden; }
        .bar-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; }

        .tap-area {
            display: flex; flex-direction: column; align-items: center; gap: 10px;
            margin-bottom: 20px;
        }
        .coin {
            width: 120px; height: 120px; border-radius: 50%;
            background: var(--accent);
            display: flex; align-items: center; justify-content: center;
            font-size: 56px; font-weight: 900; color: #fff;
            cursor: pointer; position: relative;
            transition: transform 0.06s, box-shadow 0.06s;
        }
        .coin:active { transform: scale(0.91); box-shadow: 0 0 60px 15px rgba(79,143,255,0.5); }
        .coin-cost {
            position: absolute; bottom: -4px; right: -4px;
            background: var(--surface2); border: 1px solid var(--border);
            color: var(--orange); font-size: 10px; padding: 3px 7px;
            border-radius: 20px; font-weight: 700;
        }
        .big-bal { font-size: 38px; font-weight: 800; letter-spacing: -1.5px; }
        .tap-sub { font-size: 13px; color: var(--text2); }

        /* Tabs */
        .tabs {
            display: flex; background: var(--surface); border-radius: var(--radius-sm);
            padding: 4px; gap: 4px; position: sticky; top: 0; z-index: 10; margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .tab {
            flex: 1; padding: 9px 6px; text-align: center; border-radius: 10px;
            font-weight: 600; font-size: 12px; cursor: pointer; color: var(--text2);
            transition: all 0.15s; white-space: nowrap; min-width: 50px;
        }
        .tab.active { background: var(--surface2); color: var(--text); }

        .page { display: none; flex-direction: column; gap: 12px; }
        .page.active { display: flex; }

        .card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius-sm); padding: 14px; cursor: pointer;
            text-align: center; display: flex; flex-direction: column; gap: 5px; align-items: center;
            transition: border 0.15s;
        }
        .card:active { border-color: #444; }
        .card.owned { border-color: var(--green); }
        .card-emoji { font-size: 32px; }
        .card-name { font-weight: 600; font-size: 13px; }
        .card-stat { font-size: 11px; color: var(--green); }
        .card-price { font-size: 11px; color: var(--text2); }
        .card-lvl { font-size: 10px; color: var(--accent); }

        .mine-box {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 30px; text-align: center;
            cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 12px;
        }
        .mine-box:active { background: var(--surface2); }
        .mine-icon { font-size: 60px; transition: transform 0.1s; }
        .mine-title { font-weight: 700; font-size: 15px; }
        .mine-sub { font-size: 12px; color: var(--text2); }

        /* Top */
        .top-list { display: flex; flex-direction: column; gap: 6px; }
        .top-row {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius-sm); padding: 12px 14px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .top-pos { font-weight: 800; font-size: 16px; color: var(--accent); width: 30px; }
        .top-name { font-weight: 600; font-size: 14px; flex: 1; }
        .top-bal { font-size: 13px; color: var(--text2); }
        .top-lvl { font-size: 11px; color: var(--accent); margin-left: 8px; }

        .hidden { display: none !important; }
        .overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 999;
            display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .overlay-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 28px 22px; text-align: center;
            max-width: 340px; width: 100%; display: flex; flex-direction: column; gap: 16px;
        }
        .overlay-card h2 { font-size: 22px; }
        .overlay-card p { font-size: 13px; color: var(--text2); line-height: 1.5; }
        .overlay-card input {
            background: var(--surface2); border: 1px solid var(--border);
            color: var(--text); padding: 12px; border-radius: var(--radius-xs);
            font-size: 15px; text-align: center; outline: none; font-family: var(--font);
        }
        .btn {
            padding: 12px; border: none; border-radius: var(--radius-xs);
            font-weight: 700; font-size: 14px; cursor: pointer; font-family: var(--font); width: 100%;
        }
        .btn-blue { background: var(--accent); color: #fff; }
        .btn-blue:active { opacity: 0.85; }
    </style>
</head>
<body>

    <div class="overlay hidden" id="overlay">
        <div class="overlay-card">
            <h2>🟦 Blox</h2>
            <p>Твой прогресс сохраняется на сервере.<br>Введи никнейм (только один раз).</p>
            <input type="text" id="nickInput" placeholder="Никнейм" maxlength="20">
            <button class="btn btn-blue" onclick="initUser()">🚀 Войти</button>
        </div>
    </div>

    <div class="header">
        <div class="logo">🟦 Blox</div>
        <div class="bal-pill"><span class="bal-dot"></span><span id="bal">0</span> BLOX</div>
    </div>

    <!-- Главная: статы + уровень + тап -->
    <div id="page-main" class="page active">
        <div class="stats-row">
            <div class="stat-box"><div class="stat-val" id="tapVal">1</div><div class="stat-lbl">За тап</div></div>
            <div class="stat-box"><div class="stat-val" id="powerVal">30000</div><div class="stat-lbl">Power</div></div>
            <div class="stat-box"><div class="stat-val" id="incVal">0</div><div class="stat-lbl">Доход/ч</div></div>
        </div>
        <div class="level-card">
            <div class="lvl-circle" id="lvlBadge">1</div>
            <div class="lvl-info">
                <div class="lvl-name" id="lvlName">Новичок</div>
                <div class="lvl-sub"><span id="lvlProgress">0</span> / <span id="lvlNext">1M</span></div>
                <div class="bar"><div class="bar-fill" id="lvlBar" style="width:0%"></div></div>
            </div>
        </div>
        <div class="tap-area">
            <div class="coin" id="tapBtn">B<span class="coin-cost" id="costLabel">-10</span></div>
            <div class="big-bal" id="bigBal">0</div>
            <div class="tap-sub">+<span id="perTapSpan">1</span> BLOX за тап</div>
        </div>
    </div>

    <!-- Табы -->
    <div class="tabs" id="tabs">
        <div class="tab active" data-page="main">🏠 Главная</div>
        <div class="tab" data-page="assets">🏖 Активы</div>
        <div class="tab" data-page="boosts">⚡ Бусты</div>
        <div class="tab" data-page="mining">⛏ Майнинг</div>
        <div class="tab" data-page="top">🏆 Топ</div>
    </div>

    <!-- Страницы -->
    <div class="page" id="page-assets"><div class="card-grid" id="assetsGrid"></div></div>
    <div class="page" id="page-boosts"><div class="card-grid" id="boostsGrid"></div></div>
    <div class="page" id="page-mining">
        <div class="mine-box" id="mineBox">
            <div class="mine-icon" id="mineIcon">💎</div>
            <div class="mine-title">Копай алмазы!</div>
            <div class="mine-sub">+<span id="mineReward">50</span> BLOX за удар</div>
        </div>
    </div>
    <div class="page" id="page-top"><div class="top-list" id="topList">Загрузка...</div></div>

<script>
// --- State ---
let uid = "";
let balance = 0, perTap = 1, power = 30000, maxPower = 30000, powerCost = 10;
let incomePerHour = 0, nickname = "", level = 1, totalEarned = 0;
let assetsOwned = {}, boostsOwned = {};
let loaded = false;
const API = "/api";

const levels = [
    { name:"Новичок", cost:1_000_000, power:30000, pCost:10, tapBase:1 },
    { name:"Продвинутый", cost:10_000_000, power:50000, pCost:15, tapBase:3 },
    { name:"Эксперт", cost:50_000_000, power:80000, pCost:20, tapBase:6 },
    { name:"Мастер", cost:100_000_000, power:120000, pCost:25, tapBase:12 },
    { name:"Грандмастер", cost:250_000_000, power:200000, pCost:30, tapBase:25 },
    { name:"Элита", cost:500_000_000, power:350000, pCost:40, tapBase:50 },
    { name:"Легенда", cost:1_000_000_000, power:500000, pCost:50, tapBase:100 },
];

const assets = [
    { id:"beach", emoji:"🏖️", name:"Blox на пляже", cost:50000, inc:100, upg:25000 },
    { id:"car", emoji:"🏎️", name:"Blox в тачке", cost:150000, inc:350, upg:75000 },
    { id:"jet", emoji:"✈️", name:"Blox в джете", cost:500000, inc:1000, upg:250000 },
    { id:"moon", emoji:"🌙", name:"Blox на Луне", cost:2_000_000, inc:5000, upg:1_000_000 },
    { id:"crown", emoji:"👑", name:"Король Blox", cost:10_000_000, inc:20000, upg:5_000_000 },
    { id:"galaxy", emoji:"🌌", name:"Галактика", cost:50_000_000, inc:100000, upg:25_000_000 },
];

const baseBoosts = [
    { id:"multitap", emoji:"👆", name:"Мультитап", desc:"+1 за тап", baseCost:1000 },
    { id:"powerup", emoji:"⚡", name:"Power+", desc:"+5K макс.Power", baseCost:5000 },
    { id:"pickaxe", emoji:"⛏", name:"Кирка PRO", desc:"+25 к добыче", baseCost:10000 },
];

function boostCost(b) {
    const lvl = boostsOwned[b.id] || 0;
    return Math.floor(b.baseCost * Math.pow(1.8, lvl));
}

// --- TG Init ---
const tg = window.Telegram?.WebApp;
if (tg) {
    tg.ready();
    tg.expand();
    uid = tg.initDataUnsafe?.user?.id?.toString() || "";
}

async function initUser() {
    nickname = document.getElementById("nickInput").value || "Анон";
    // Пытаемся загрузить с сервера
    const resp = await fetch(`${API}/user?uid=${uid}`);
    if (resp.ok) {
        const data = await resp.json();
        if (data.nickname && data.nickname !== nickname) {
            // уже есть ник
        }
        loadFromServer(data);
    } else {
        // новый юзер — сохраняем
        await saveToServer();
    }
    document.getElementById("overlay").classList.add("hidden");
    loaded = true;
    updateAll();
    renderAssets();
    renderBoosts();
    loadTop();
}

function loadFromServer(data) {
    balance = data.balance || 0;
    perTap = data.perTap || 1;
    power = data.power || 30000;
    maxPower = data.maxPower || 30000;
    powerCost = data.powerCost || 10;
    incomePerHour = data.incomePerHour || 0;
    nickname = data.nickname || "Анон";
    level = data.level || 1;
    totalEarned = data.totalEarned || 0;
    assetsOwned = data.assets || {};
    boostsOwned = data.boosts || {};
}

async function saveToServer() {
    if (!uid || !loaded) return;
    await fetch(`${API}/save`, {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
            uid, balance, perTap, power, maxPower, powerCost,
            incomePerHour, nickname, level, totalEarned,
            assets: assetsOwned, boosts: boostsOwned,
        })
    });
}

function fmt(n) {
    if (n >= 1e9) return (n/1e9).toFixed(1)+"B";
    if (n >= 1e6) return (n/1e6).toFixed(1)+"M";
    if (n >= 1e3) return (n/1e3).toFixed(1)+"K";
    return Math.floor(n).toString();
}

function updateAll() {
    document.getElementById("bal").textContent = fmt(balance);
    document.getElementById("bigBal").textContent = fmt(balance);
    document.getElementById("tapVal").textContent = perTap;
    document.getElementById("perTapSpan").textContent = perTap;
    document.getElementById("powerVal").textContent = power;
    document.getElementById("incVal").textContent = fmt(incomePerHour);
    document.getElementById("costLabel").textContent = "-"+powerCost;

    const lvl = levels[Math.min(level-1, levels.length-1)];
    document.getElementById("lvlBadge").textContent = level;
    document.getElementById("lvlName").textContent = lvl.name;
    document.getElementById("lvlProgress").textContent = fmt(totalEarned);
    if (level > levels.length) {
        document.getElementById("lvlNext").textContent = "MAX";
        document.getElementById("lvlBar").style.width = "100%";
    } else {
        document.getElementById("lvlNext").textContent = fmt(lvl.cost);
        document.getElementById("lvlBar").style.width = Math.min(100, (totalEarned/lvl.cost)*100)+"%";
    }
}

// --- Tap ---
document.getElementById("tapBtn").addEventListener("click", () => {
    if (power < powerCost) return;
    power -= powerCost;
    balance += perTap;
    totalEarned += perTap;
    checkLvl();
    updateAll();
    if (navigator.vibrate) navigator.vibrate(5);
});

function checkLvl() {
    while (level <= levels.length && totalEarned >= levels[level-1].cost) {
        const l = levels[level-1];
        maxPower = l.power; power = maxPower; powerCost = l.pCost;
        perTap = l.tapBase + (boostsOwned["multitap"]||0);
        level++;
        recalcIncome();
    }
}

// --- Assets ---
function renderAssets() {
    const g = document.getElementById("assetsGrid");
    g.innerHTML = "";
    assets.forEach(a => {
        const own = assetsOwned[a.id]||0;
        const card = document.createElement("div");
        card.className = "card" + (own>0?" owned":"");
        card.innerHTML = `<div class="card-emoji">${a.emoji}</div>
            <div class="card-name">${a.name}</div>
            <div class="card-stat">+${fmt(a.inc*(own||1))}/ч</div>
            <div class="card-price">${own>0?"Улучшить: "+fmt(a.upg):fmt(a.cost)+" BLOX"}</div>
            ${own>0?`<div class="card-lvl">Ур. ${own}</div>`:""}`;
        card.addEventListener("click", () => buyAsset(a));
        g.appendChild(card);
    });
}

function buyAsset(a) {
    const own = assetsOwned[a.id]||0;
    const cost = own>0 ? a.upg : a.cost;
    if (balance < cost) return;
    balance -= cost;
    assetsOwned[a.id] = own+1;
    recalcIncome();
    updateAll();
    renderAssets();
    saveToServer();
}

function recalcIncome() {
    incomePerHour = 0;
    assets.forEach(a => { const o = assetsOwned[a.id]||0; if(o>0) incomePerHour += a.inc*o; });
}

// --- Boosts ---
function renderBoosts() {
    const g = document.getElementById("boostsGrid");
    g.innerHTML = "";
    baseBoosts.forEach(b => {
        const lvl = boostsOwned[b.id]||0;
        const cost = boostCost(b);
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `<div class="card-emoji">${b.emoji}</div>
            <div class="card-name">${b.name}</div>
            <div class="card-stat">${b.desc}</div>
            <div class="card-price">${fmt(cost)} BLOX</div>
            ${lvl>0?`<div class="card-lvl">Ур. ${lvl}</div>`:""}`;
        card.addEventListener("click", () => buyBoost(b));
        g.appendChild(card);
    });
}

function buyBoost(b) {
    const cost = boostCost(b);
    if (balance < cost) return;
    balance -= cost;
    boostsOwned[b.id] = (boostsOwned[b.id]||0)+1;
    if (b.id==="multitap") perTap++;
    if (b.id==="powerup") { maxPower+=5000; power=maxPower; }
    updateAll();
    renderBoosts();
    saveToServer();
}

// --- Mining ---
document.getElementById("mineBox").addEventListener("click", () => {
    let rew = 50 + (boostsOwned["pickaxe"]||0)*25;
    balance += rew;
    totalEarned += rew;
    document.getElementById("mineReward").textContent = rew;
    checkLvl();
    updateAll();
    saveToServer();
    const icon = document.getElementById("mineIcon");
    icon.style.transform = "scale(0.8)";
    setTimeout(() => icon.style.transform = "scale(1)", 100);
    if (navigator.vibrate) navigator.vibrate(10);
});

// --- Top ---
async function loadTop() {
    const resp = await fetch(`${API}/top`);
    const data = await resp.json();
    const list = document.getElementById("topList");
    list.innerHTML = data.map((u, i) => `
        <div class="top-row">
            <div class="top-pos">#${i+1}</div>
            <div class="top-name">${u.username}</div>
            <div class="top-lvl">Ур.${u.level}</div>
            <div class="top-bal">${fmt(u.balance)} BLOX</div>
        </div>
    `).join("");
}

// --- Tabs ---
document.querySelectorAll(".tab").forEach(t => {
    t.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach(x => x.classList.remove("active"));
        t.classList.add("active");
        document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
        const pageId = "page-"+t.dataset.page;
        const pageEl = document.getElementById(pageId);
        if (pageEl) pageEl.classList.add("active");
        if (t.dataset.page === "top") loadTop();
    });
});

// --- Start ---
if (uid) {
    // Пробуем загрузить
    fetch(`${API}/user?uid=${uid}`).then(async r => {
        if (r.ok) {
            const d = await r.json();
            loadFromServer(d);
            loaded = true;
            updateAll();
            renderAssets();
            renderBoosts();
            loadTop();
        } else {
            document.getElementById("overlay").classList.remove("hidden");
        }
    });
} else {
    // Без TG — localhost для теста
    uid = "test_" + Date.now();
    document.getElementById("overlay").classList.remove("hidden");
}

// --- Passive income ---
setInterval(() => {
    if (incomePerHour > 0 && loaded) {
        balance += incomePerHour/360;
        totalEarned += incomePerHour/360;
        checkLvl();
        updateAll();
        saveToServer();
    }
}, 10000);

// --- Power regen ---
setInterval(() => {
    if (power < maxPower) {
        power = Math.min(maxPower, power + Math.ceil(maxPower/300));
        updateAll();
    }
}, 1000);
</script>
</body>
</html>
